# ── DEVELOPMENT compose ───────────────────────────────────────────────────────
# Hot-reload for both backend and frontend.  NOT for production use.
# For production, use docker-compose.prod.yml or build the root Dockerfile.
#
# Usage:
#   docker compose up           # start both services
#   docker compose up backend   # backend only (port 8000)
# ─────────────────────────────────────────────────────────────────────────────

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend/src:/app/src   # live source reload
      - ./data:/app/data         # persisted DB + images
    environment:
      - PYTHONPATH=/app/src
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile   # runs pnpm dev — Vite HMR
    ports:
      - "5173:5173"
    environment:
      - VITE_API_TARGET=http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
